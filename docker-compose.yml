version: '3.8'

services:
  backend:
    build:
      context: ./paids_demo
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./paids_demo:/app
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./paids_demo
      dockerfile: Dockerfile.frontend
    ports:
      - "7860:7860"
    depends_on:
      - backend
    environment:
      - API_URL=http://backend:8000
      - PYTHONUNBUFFERED=1
